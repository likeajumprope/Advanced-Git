format:
  html:
    theme:
      - cyborg
      - assets/scss/custom.scss
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    code-copy: true
    code-fold: false
    code-overflow: wrap
    code-line-numbers: false
    highlight-style: monokai
    link-external-icon: true
    link-external-newwindow: true
    smooth-scroll: true
    anchor-sections: true
    citations-hover: false

execute:
  echo: true
  eval: false
